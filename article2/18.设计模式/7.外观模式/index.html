    <style>
      .snow-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.02);
        pointer-events: none;
        z-index: 100001;
      }

    <link rel="stylesheet" href="/my-demo-markdown/umi.8c3e9365.css" />
    <script>
      window.routerBase = "/my-demo-markdown";

    <script>
      //! umi version: 3.5.34
    </script>
    <script src="https://cdn.bootcdn.net/ajax/libs/three.js/0.144.0/three.js"></script>
    <script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.1/jquery.js"></script>
    <script>
      !(function () {
        var e = localStorage.getItem("dumi:prefers-color"),
          t = window.matchMedia("(prefers-color-scheme: dark)").matches,
          r = ["light", "dark", "auto"];
        document.documentElement.setAttribute(
          "data-prefers-color",
          e === r[2] ? (t ? r[1] : r[0]) : r.indexOf(e) > -1 ? e : r[0]
        );
      })();
    </script>
    <title>外观模式 - my-demo-markdown</title>

  <body>
    <div id="root"></div>

    <script charset="utf-8">
      (function () {
        let divs = document.createElement("div");
        divs.className = "snow-container";
        document.querySelector("body")?.appendChild(divs);
      })();
    </script>
    <script src="/my-demo-markdown/js/show.js"></script>
    <script src="/my-demo-markdown/umi.e0def2d0.js"></script>
